<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과일 & 7 슬롯머신 시뮬레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        /* 슬롯 릴 애니메이션 효과 */
        .slot-rolling {
            animation: roll 0.1s linear infinite;
        }
        @keyframes roll {
            0% { transform: translateY(-10px); opacity: 0.5; }
            50% { transform: translateY(10px); opacity: 0.8; }
            100% { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        
        <div class="bg-gradient-to-r from-pink-500 via-yellow-500 to-red-500 p-6 text-center text-white relative">
            <span class="absolute top-3 right-3 bg-white/20 text-xs px-2 py-1 rounded-full backdrop-blur-sm font-medium">고등학생용 확률 분석기</span>
            <h1 class="text-2xl font-black tracking-tight mb-1 mt-2">🎰 과일 & 7 슬롯머신</h1>
            <p class="text-sm text-white/90">딸기·바나나·파인애플·7 조합 시뮬레이터</p>
